<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="2650" viewBox="0 0 1240 2650">
<rect x="0" y="0" width="1240" height="2650" fill="#0b1020" rx="14"/>
<rect x="0" y="0" width="1240" height="34" fill="#141b2f" rx="14"/>
<circle cx="18" cy="17" r="5" fill="#ff5f56"/>
<circle cx="36" cy="17" r="5" fill="#ffbd2e"/>
<circle cx="54" cy="17" r="5" fill="#27c93f"/>
<text x="74" y="22" fill="#b9c6e8" font-family="Menlo, Monaco, Consolas, monospace" font-size="12">07_pipeline_files</text>
<g font-family="Menlo, Monaco, Consolas, monospace" font-size="14"><text x="20" y="54" fill="#d7e3ff">Jenkinsfile</text><text x="20" y="76" fill="#d7e3ff">pipeline {</text><text x="20" y="98" fill="#d7e3ff">    agent any</text><text x="20" y="120" fill="#d7e3ff">    environment {</text><text x="20" y="142" fill="#d7e3ff">        IMAGE_NAME = 'liquidity-app-ci'</text><text x="20" y="164" fill="#d7e3ff">        TARGET_PLATFORMS = 'linux/amd64,linux/arm64'</text><text x="20" y="186" fill="#d7e3ff">    }</text><text x="20" y="208" fill="#d7e3ff">    stages {</text><text x="20" y="230" fill="#d7e3ff">        stage('Checkout') {</text><text x="20" y="252" fill="#d7e3ff">            steps {</text><text x="20" y="274" fill="#d7e3ff">                checkout scm</text><text x="20" y="296" fill="#d7e3ff">            }</text><text x="20" y="318" fill="#d7e3ff">        }</text><text x="20" y="340" fill="#d7e3ff">        stage('Lint') {</text><text x="20" y="362" fill="#d7e3ff">            steps {</text><text x="20" y="384" fill="#d7e3ff">                sh 'python3 -m py_compile app/*.py'</text><text x="20" y="406" fill="#d7e3ff">            }</text><text x="20" y="428" fill="#d7e3ff">        }</text><text x="20" y="450" fill="#d7e3ff">        stage('Quality Gate: Multi-Arch Config') {</text><text x="20" y="472" fill="#d7e3ff">            steps {</text><text x="20" y="494" fill="#d7e3ff">                sh '''</text><text x="20" y="516" fill="#d7e3ff">                echo "[gate] TARGET_PLATFORMS=$TARGET_PLATFORMS"</text><text x="20" y="538" fill="#d7e3ff">                echo "$TARGET_PLATFORMS" | grep -q 'linux/amd64' || (echo 'missing linux/amd64' &amp;&amp; exit 1)</text><text x="20" y="560" fill="#d7e3ff">                echo "$TARGET_PLATFORMS" | grep -q 'linux/arm64' || (echo 'missing linux/arm64' &amp;&amp; exit 1)</text><text x="20" y="582" fill="#d7e3ff">                '''</text><text x="20" y="604" fill="#d7e3ff">            }</text><text x="20" y="626" fill="#d7e3ff">        }</text><text x="20" y="648" fill="#d7e3ff">        stage('Build Multi-Arch') {</text><text x="20" y="670" fill="#d7e3ff">            steps {</text><text x="20" y="692" fill="#d7e3ff">                sh '''</text><text x="20" y="714" fill="#d7e3ff">                docker buildx create --name ci_builder --use || docker buildx use ci_builder</text><text x="20" y="736" fill="#d7e3ff">                docker buildx inspect --bootstrap</text><text x="20" y="758" fill="#d7e3ff">                mkdir -p raw</text><text x="20" y="780" fill="#d7e3ff">                docker buildx build \</text><text x="20" y="802" fill="#d7e3ff">                  --platform $TARGET_PLATFORMS \</text><text x="20" y="824" fill="#d7e3ff">                  --build-arg APP_VERSION=${BUILD_NUMBER} \</text><text x="20" y="846" fill="#d7e3ff">                  -t ${IMAGE_NAME}:${BUILD_NUMBER} \</text><text x="20" y="868" fill="#d7e3ff">                  --output=type=oci,dest=raw/liquidity_multiarch_${BUILD_NUMBER}.tar \</text><text x="20" y="890" fill="#d7e3ff">                  app</text><text x="20" y="912" fill="#d7e3ff">                '''</text><text x="20" y="934" fill="#d7e3ff">            }</text><text x="20" y="956" fill="#d7e3ff">        }</text><text x="20" y="978" fill="#d7e3ff">        stage('Test Run') {</text><text x="20" y="1000" fill="#d7e3ff">            steps {</text><text x="20" y="1022" fill="#d7e3ff">                sh '''</text><text x="20" y="1044" fill="#d7e3ff">                docker build -t ${IMAGE_NAME}:smoke --build-arg APP_VERSION=${BUILD_NUMBER} app</text><text x="20" y="1066" fill="#d7e3ff">                CID=$(docker run -d -p 18000:8000 ${IMAGE_NAME}:smoke)</text><text x="20" y="1088" fill="#d7e3ff">                sleep 5</text><text x="20" y="1110" fill="#d7e3ff">                curl -fsS http://localhost:18000/health</text><text x="20" y="1132" fill="#d7e3ff">                docker rm -f $CID</text><text x="20" y="1154" fill="#d7e3ff">                '''</text><text x="20" y="1176" fill="#d7e3ff">            }</text><text x="20" y="1198" fill="#d7e3ff">        }</text><text x="20" y="1220" fill="#d7e3ff">    }</text><text x="20" y="1242" fill="#d7e3ff">    post {</text><text x="20" y="1264" fill="#d7e3ff">        always {</text><text x="20" y="1286" fill="#d7e3ff">            sh 'docker buildx rm ci_builder || true'</text><text x="20" y="1308" fill="#d7e3ff">        }</text><text x="20" y="1330" fill="#d7e3ff">    }</text><text x="20" y="1352" fill="#d7e3ff">}</text><text x="20" y="1374" fill="#d7e3ff"></text><text x="20" y="1396" fill="#d7e3ff">.github/workflows/ci.yml</text><text x="20" y="1418" fill="#d7e3ff">name: Lab4 CI Variant 9</text><text x="20" y="1440" fill="#d7e3ff"></text><text x="20" y="1462" fill="#d7e3ff">on:</text><text x="20" y="1484" fill="#d7e3ff">  push:</text><text x="20" y="1506" fill="#d7e3ff">    branches: ["main", "master"]</text><text x="20" y="1528" fill="#d7e3ff">  pull_request:</text><text x="20" y="1550" fill="#d7e3ff"></text><text x="20" y="1572" fill="#d7e3ff">jobs:</text><text x="20" y="1594" fill="#d7e3ff">  pipeline:</text><text x="20" y="1616" fill="#d7e3ff">    runs-on: ubuntu-latest</text><text x="20" y="1638" fill="#d7e3ff">    env:</text><text x="20" y="1660" fill="#d7e3ff">      IMAGE_NAME: liquidity-app-ci</text><text x="20" y="1682" fill="#d7e3ff">      TARGET_PLATFORMS: linux/amd64,linux/arm64</text><text x="20" y="1704" fill="#d7e3ff">    steps:</text><text x="20" y="1726" fill="#d7e3ff">      - name: Checkout</text><text x="20" y="1748" fill="#d7e3ff">        uses: actions/checkout@v4</text><text x="20" y="1770" fill="#d7e3ff"></text><text x="20" y="1792" fill="#d7e3ff">      - name: Set up Python</text><text x="20" y="1814" fill="#d7e3ff">        uses: actions/setup-python@v5</text><text x="20" y="1836" fill="#d7e3ff">        with:</text><text x="20" y="1858" fill="#d7e3ff">          python-version: "3.10"</text><text x="20" y="1880" fill="#d7e3ff"></text><text x="20" y="1902" fill="#d7e3ff">      - name: Lint (syntax gate)</text><text x="20" y="1924" fill="#d7e3ff">        run: |</text><text x="20" y="1946" fill="#d7e3ff">          python -m py_compile app/*.py</text><text x="20" y="1968" fill="#d7e3ff"></text><text x="20" y="1990" fill="#d7e3ff">      - name: Quality Gate - Multi-Arch platforms</text><text x="20" y="2012" fill="#d7e3ff">        run: |</text><text x="20" y="2034" fill="#d7e3ff">          echo "TARGET_PLATFORMS=$TARGET_PLATFORMS"</text><text x="20" y="2056" fill="#d7e3ff">          echo "$TARGET_PLATFORMS" | grep -q 'linux/amd64'</text><text x="20" y="2078" fill="#d7e3ff">          echo "$TARGET_PLATFORMS" | grep -q 'linux/arm64'</text><text x="20" y="2100" fill="#d7e3ff"></text><text x="20" y="2122" fill="#d7e3ff">      - name: Set up QEMU</text><text x="20" y="2144" fill="#d7e3ff">        uses: docker/setup-qemu-action@v3</text><text x="20" y="2166" fill="#d7e3ff"></text><text x="20" y="2188" fill="#d7e3ff">      - name: Set up Docker Buildx</text><text x="20" y="2210" fill="#d7e3ff">        uses: docker/setup-buildx-action@v3</text><text x="20" y="2232" fill="#d7e3ff"></text><text x="20" y="2254" fill="#d7e3ff">      - name: Build Multi-Arch OCI artifact</text><text x="20" y="2276" fill="#d7e3ff">        run: |</text><text x="20" y="2298" fill="#d7e3ff">          mkdir -p raw</text><text x="20" y="2320" fill="#d7e3ff">          docker buildx build \</text><text x="20" y="2342" fill="#d7e3ff">            --platform "$TARGET_PLATFORMS" \</text><text x="20" y="2364" fill="#d7e3ff">            --build-arg APP_VERSION=${{ github.run_number }} \</text><text x="20" y="2386" fill="#d7e3ff">            -t ${IMAGE_NAME}:${{ github.run_number }} \</text><text x="20" y="2408" fill="#d7e3ff">            --output=type=oci,dest=raw/liquidity_multiarch_${{ github.run_number }}.tar \</text><text x="20" y="2430" fill="#d7e3ff">            app</text><text x="20" y="2452" fill="#d7e3ff"></text><text x="20" y="2474" fill="#d7e3ff">      - name: Smoke test single-arch image</text><text x="20" y="2496" fill="#d7e3ff">        run: |</text><text x="20" y="2518" fill="#d7e3ff">          docker build -t ${IMAGE_NAME}:smoke --build-arg APP_VERSION=${{ github.run_number }} app</text><text x="20" y="2540" fill="#d7e3ff">          cid=$(docker run -d -p 18000:8000 ${IMAGE_NAME}:smoke)</text><text x="20" y="2562" fill="#d7e3ff">          sleep 5</text><text x="20" y="2584" fill="#d7e3ff">          curl -fsS http://localhost:18000/health</text><text x="20" y="2606" fill="#d7e3ff">          docker rm -f "$cid"</text></g>
</svg>