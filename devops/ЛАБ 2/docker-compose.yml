# ============================================================
# docker-compose.yml — Liquidity App (Variant 9)
# FastAPI + PostgreSQL + ETL loader
# ============================================================

services:
  db:
    image: postgres:16-alpine
    container_name: liquidity_db
    restart: unless-stopped
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - backend-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 12

  loader:
    build:
      context: ./app
      args:
        APP_VERSION: ${APP_VERSION}
    container_name: liquidity_loader
    entrypoint: ["python", "loader.py"]
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/data:ro
    networks:
      - backend-network

  analytics_app:
    build:
      context: ./app
      args:
        APP_VERSION: ${APP_VERSION}
    container_name: liquidity_app
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      loader:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    networks:
      - backend-network

volumes:
  pg_data:

networks:
  backend-network:
    driver: bridge
